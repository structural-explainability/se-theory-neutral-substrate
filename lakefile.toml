# ============================================================
# lakefile.toml
# ============================================================

# REQ.FILE.PROJECT.IDENTITY
#   Declares the externally visible identity and build surface of this package.
#   Sections marked CUSTOM are expected to vary by repository.

# === REQUIRED PROJECT IDENTITY

name = "NeutralSubstrate"
version = "0.3.0"
license = "MIT"

keywords = [
  "structural-explainability",
  "formal-contract",
  "neutrality",
  "identity-regimes",
  "invariants",
  "formal-specification",
  "formal-verification",
  "proof-carrying",
  "theorem-proving",
  "lean4",
]


# === BUILD CONFIGURATION

defaultTargets = ["NeutralSubstrate"]

# === EXPORT LIBRARY (public, exported)

[[lean_lib]]
name = "NeutralSubstrate"

# === TEST LIBRARIES (internal, not exported)

[[lean_lib]]
name = "TestBasic"
srcDir = "test"

[[lean_lib]]
name = "TestRegime"
srcDir = "test"
