# ============================================================
# SE_MANIFEST.toml (Repository Declaration)
# se-theory-neutral-substrate
# ============================================================

schema = "se-manifest-2"
schema_url = "https://raw.githubusercontent.com/structural-explainability/se-manifest-schema/v0.2.0/manifest-schema.toml"

# === Identity ===

[meta]
purpose = "Formalize the neutral structural substrate in Lean 4, defining admissibility, separation, and substrate invariants without encoding identity regimes."

[repo]
name = "se-theory-neutral-substrate"
org = "structural-explainability"
class = "theory"
kind = "foundation"
status = "active"
since = "2026"
summary = "Lean 4 formalization of the neutral structural substrate defining admissibility, separation, and substrate invariants without encoding identity regimes."

[layer]
space = "formal-theory"
role = "theory"

# === Structural contract ===

[depends]
# foundational theory repo
optional = []
required = []

[provides]
# theory repos expose Lean modules, not operational artifacts
artifacts = [
  "lean-library",
  "theorem-set",
]

[scope]
includes = [
  "neutral structural primitives",
  "substrate well-formedness",
  "admissibility conditions for regime application",
  "separation constraints (non-encoding of regimes)",
  "substrate-level invariants",
  "machine-checked Lean theorems",
]

excludes = [
  "identity regime definitions",
  "regime-profile derivation",
  "persistence behavior",
  "mapping semantics",
  "operational validation logic",
  "repository governance rules",
  "schema definitions for other repositories",
  "domain-specific mappings or data",
  "runtime systems",
]

# === Validation ===

[validation]
# Validates repository declaration, manifest schema conformance,
# reference artifacts, and Lean public surface coverage.
entrypoint = "uv run python -m se_theory_neutral_substrate validate"
strict_entrypoint = "uv run python -m se_theory_neutral_substrate validate --strict"
tag_entrypoint = "uv run python -m se_theory_neutral_substrate validate --require-tag"

# === Behavior / governance ===

[naming]
pattern = "se-theory-*"

[governance]
authority = "structural-explainability"

# === External references ===

[citation]
cff = "CITATION.cff"
preferred = "CITATION.cff"

[traceability]
identifier_map = "reference/index.toml"
